{% extends "base.html" %}

{% block content %}
  {% if section.extra.section_path %}
    {% set section = get_section(path=section.extra.section_path) %}
  {% endif %}

  {{ macros::set_title(title=section.title) }}

  <main>
    {{ macros::list_posts(pages=section.pages) }}
  </main>
{% endblock content %}
