{% extends "base.html" %}

{% block content %}
<article class="post-content">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      [{{ page.date | date(format="%Y-%m-%d") }}] &mdash; {{ page.reading_time }} min read
    </div>
  </header>
  <hr class="post-divider">
  {{ page.content | safe }}
</article>
{% endblock content %}
